apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limit-range
spec:
  limits:
    - type: Container
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: 500m
        memory: 512Mi
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 200m
        memory: 256Mi