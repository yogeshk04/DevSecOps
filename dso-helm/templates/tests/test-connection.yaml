apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "dso-helm.fullname" . }}-test-connection"
  labels:
    {{- include "dso-helm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "dso.frontend.name" . }}:{{ .Values.frontend.service.port }}']
  restartPolicy: Never
