apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dso.secret.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dso-helm.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: {{ include "dso-helm.name" . }}
type: Opaque
data:
  # Keys match the PostgreSQL env var names so the DB pod can use envFrom directly.
  POSTGRES_USER:     {{ .Values.db.auth.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.auth.password | b64enc | quote }}
  POSTGRES_DB:       {{ .Values.db.auth.database | b64enc | quote }}
