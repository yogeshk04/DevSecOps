apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dso.db.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dso-helm.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "dso.db.name" . }}
    app.kubernetes.io/part-of: {{ include "dso-helm.name" . }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  # Recreate is required for ReadWriteOnce volumes — only one pod can attach at a time.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dso.db.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "dso.db.name" . }}
        app.kubernetes.io/part-of: {{ include "dso-helm.name" . }}
        app.kubernetes.io/component: database
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: {{ .Values.db.image.pullPolicy }}
          ports:
            - containerPort: 5432
              protocol: TCP
          # envFrom loads all Secret keys directly as env vars (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB).
          envFrom:
            - secretRef:
                name: {{ include "dso.secret.name" . }}
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            {{- toYaml .Values.db.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Postgres needs write access to data dir
            runAsNonRoot: false             # Postgres runs initdb as root then drops privileges
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.db.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.db.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.db.livenessProbe.timeoutSeconds }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.db.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.db.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.db.readinessProbe.timeoutSeconds }}
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: {{ include "dso.pvc.name" . }}
