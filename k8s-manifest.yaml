# ==============================================================
# devsecops Blog Platform - Kubernetes Manifest (Single File)
# Includes: Namespace, Secrets, PVC (EBS), DB, Backend, Frontend
# ==============================================================

# ---- Namespace ----
apiVersion: v1
kind: Namespace
metadata:
  name: devsecops
  labels:
    app.kubernetes.io/part-of: devsecops

---
# ---- Database Secret ----
# In production, use External Secrets Operator or Sealed Secrets.
# This is base64 encoded for demo purposes.
# echo -n 'devsecops_user' | base64 → amVybmV5X3VzZXI=
# echo -n 'devsecops_pass_2026' | base64 → amVybmV5X3Bhc3NfMjAyNg==
# echo -n 'devsecops_db' | base64 → amVybmV5X2Ri

apiVersion: v1
kind: Secret
metadata:
  name: devsecops-db-secret
  namespace: devsecops
  labels:
    app.kubernetes.io/part-of: devsecops
type: Opaque
data:
  POSTGRES_USER: amVybmV5X3VzZXI=
  POSTGRES_PASSWORD: amVybmV5X3Bhc3NfMjAyNg==
  POSTGRES_DB: amVybmV5X2Ri

---
# ---- EBS StorageClass (gp3) ----
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: devsecops-ebs-sc
provisioner: ebs.csi.eks.amazonaws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
# ---- PersistentVolumeClaim for PostgreSQL (EBS) ----
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devsecops-db-pvc
  namespace: devsecops
  labels:
    app.kubernetes.io/part-of: devsecops
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: devsecops-ebs-sc
  resources:
    requests:
      storage: 10Gi

---
# ---- PostgreSQL Deployment ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-db
  namespace: devsecops
  labels:
    app.kubernetes.io/name: devsecops-db
    app.kubernetes.io/part-of: devsecops
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate # Required for RWO volumes
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-db
        app.kubernetes.io/part-of: devsecops
        app.kubernetes.io/component: database
    spec:
      # Security: don't automount service account token (DB doesn't need K8s API)
      automountServiceAccountToken: false
      tolerations:
        - key: "karpenter.sh/disrupted"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: devsecops-db-secret
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Postgres needs write access
            runAsNonRoot: false            # Postgres image runs initdb as root then drops
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "devsecops_user", "-d", "devsecops_db"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "devsecops_user", "-d", "devsecops_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: devsecops-db-pvc

---
# ---- PostgreSQL Service (ClusterIP — internal only) ----
apiVersion: v1
kind: Service
metadata:
  name: devsecops-db
  namespace: devsecops
  labels:
    app.kubernetes.io/name: devsecops-db
    app.kubernetes.io/part-of: devsecops
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devsecops-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP

---
# ---- Backend Deployment ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-backend
  namespace: devsecops
  labels:
    app.kubernetes.io/name: devsecops-backend
    app.kubernetes.io/part-of: devsecops
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-backend
        app.kubernetes.io/part-of: devsecops
        app.kubernetes.io/component: backend
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: "karpenter.sh/disrupted"
          operator: "Exists"
          effect: "NoSchedule"
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for devsecops-db:5432..."
              until nc -z devsecops-db 5432; do
                echo "DB not ready, retrying in 3s..."
                sleep 3
              done
              echo "DB is ready!"
      containers:
        - name: backend
          image: ghcr.io/iam-veeramalla/devsecops/devsecops-backend:75da1da
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "devsecops-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: devsecops-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devsecops-db-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: devsecops-db-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

---
# ---- Backend Service (ClusterIP — internal only) ----
apiVersion: v1
kind: Service
metadata:
  name: devsecops-backend
  namespace: devsecops
  labels:
    app.kubernetes.io/name: devsecops-backend
    app.kubernetes.io/part-of: devsecops
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devsecops-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP

---
# ---- Frontend Deployment ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-frontend
  namespace: devsecops
  labels:
    app.kubernetes.io/name: devsecops-frontend
    app.kubernetes.io/part-of: devsecops
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-frontend
        app.kubernetes.io/part-of: devsecops
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      tolerations:
        - key: "karpenter.sh/disrupted"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: frontend
          image: ghcr.io/iam-veeramalla/devsecops/devsecops-frontend:75da1da
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Nginx needs write for cache/pid
            runAsNonRoot: true
            runAsUser: 101 # nginx user UID in alpine
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
# ---- Frontend Service (NodePort — for access via port-forward or node IP) ----
# NOTE: Changed from LoadBalancer because this AWS account does not support
# creating load balancers. Use `kubectl port-forward svc/devsecops-frontend 8080:80 -n devsecops`
# to access the frontend locally.
apiVersion: v1
kind: Service
metadata:
  name: devsecops-frontend
  namespace: devsecops
  labels:
    app.kubernetes.io/name: devsecops-frontend
    app.kubernetes.io/part-of: devsecops
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: devsecops-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

---
# ---- NetworkPolicy: DB only accepts traffic from Backend ----
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devsecops-db-allow-backend-only
  namespace: devsecops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: devsecops-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: devsecops-backend
      ports:
        - port: 5432
          protocol: TCP

---
# ---- NetworkPolicy: Backend accepts traffic from Frontend only ----
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devsecops-backend-allow-frontend-only
  namespace: devsecops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: devsecops-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: devsecops-frontend
      ports:
        - port: 5000
          protocol: TCP
          
