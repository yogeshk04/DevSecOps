apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devsecops.frontend.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devsecops.labels" . | nindent 4 }}
    app.kubernetes.io/name: frontend
data:
  # This server block is mounted over /etc/nginx/conf.d/default.conf in the container.
  # The proxy_pass host is derived from the backend Helm service name so it is
  # correct for whatever release name is used.
  default.conf: |
    server {
        listen {{ .Values.frontend.port }};
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Serve static files; fall back to index.html for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the backend service (ClusterIP DNS)
        location /api/ {
            proxy_pass http://{{ include "devsecops.backend.fullname" . }}:{{ .Values.backend.port }};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Security: deny access to dotfiles
        location ~ /\. {
            deny all;
            return 404;
        }
    }
