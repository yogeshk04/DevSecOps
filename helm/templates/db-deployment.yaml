apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devsecops.db.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devsecops.labels" . | nindent 4 }}
    app.kubernetes.io/name: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: db
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    # Recreate ensures the PVC is released before the new pod attaches it.
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 999   # postgres group in the official image
      containers:
        - name: postgres
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: {{ .Values.db.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "devsecops.secret.name" . }}
                  key: db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devsecops.secret.name" . }}
                  key: db-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "devsecops.secret.name" . }}
                  key: db-name
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.db.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.db.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.db.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.db.livenessProbe.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.db.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.db.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.db.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.db.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.db.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "devsecops.db.fullname" . }}-pvc
